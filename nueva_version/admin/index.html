<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel de Administración</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #A28A68; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #8a7356; }
        #error-msg { color: #ff4d4d; margin-top: 15px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2 style="margin-bottom: 20px;">Estudio Precinto</h2>
        <p style="color: #888; font-size: 0.9em; margin-bottom: 30px;">Acceso restringido</p>
        
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" id="btn-login">Ingresar al Panel</button>
        </form>
        
        <p id="error-msg">Credenciales inválidas o acceso denegado.</p>
    </div>

    <!-- Firebase SDK (Version 8 compat for simplicity in vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Lógica del admin -->
    <script src="js/admin.js"></script>

</body>
</html>
