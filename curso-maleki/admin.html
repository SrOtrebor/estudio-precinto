<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel de Control — Academia Maleki</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .admin-wrap{padding-top:80px;max-width:1200px;margin:0 auto;padding-left:1.5rem;padding-right:1.5rem;padding-bottom:4rem}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1.5rem;margin-bottom:2rem}
  .stat-card{
    background:rgba(255,255,255,0.03);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:1.5rem;text-align:center;
  }
  .stat-val{font-size:2rem;font-family:'Cinzel',serif;color:var(--gold);display:block}
  .stat-lbl{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em}

  .admin-table-wrap{
    background:rgba(18,16,42,0.6);border:1px solid var(--border);
    border-radius:var(--radius-lg);overflow:hidden;backdrop-filter:blur(10px);
  }
  table{width:100%;border-collapse:collapse;font-size:0.9rem}
  th{text-align:left;padding:1rem;background:rgba(255,255,255,0.05);color:var(--gold);font-family:'Cinzel',serif;font-weight:400;font-size:0.8rem}
  td{padding:1rem;border-top:1px solid rgba(255,255,255,0.05);color:var(--text)}
  tr:hover{background:rgba(255,255,255,0.02)}
  
  .badge{padding:0.25rem 0.6rem;border-radius:12px;font-size:0.7rem;font-weight:600}
  .badge-gold{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-dim)}
  .badge-blue{background:rgba(61,107,158,0.15);color:#4da6ff;border:1px solid #4da6ff66}
  
  .search-admin{
    background:rgba(255,255,255,0.05);border:1px solid var(--border);
    border-radius:var(--radius);padding:0.6rem 1rem;color:var(--text);
    width:300px;margin-bottom:1.5rem;outline:none;
  }
</style>
</head>
<body>
<div class="bg-stars"></div>
<nav class="nav">
  <a href="index.html" class="nav-logo">Academia <span>Maleki</span></a>
  <ul class="nav-links">
    <li><a href="dashboard.html">Mi Camino</a></li>
    <li><a href="admin.html" class="active">Panel Admin</a></li>
  </ul>
</nav>

<div class="admin-wrap page">
  <div class="mb-3">
    <h1 class="font-cinzel text-gold">Maestría de Supervisión</h1>
    <p class="text-muted">Gestiona el progreso de todos los estudiantes de la Academia.</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><span class="stat-val" id="total-users">0</span><span class="stat-lbl">Estudiantes</span></div>
    <div class="stat-card"><span class="stat-val" id="total-exams">0</span><span class="stat-lbl">Exámenes Realizados</span></div>
    <div class="stat-card"><span class="stat-val" id="avg-score">0%</span><span class="stat-lbl">Promedio Académico</span></div>
  </div>

  <input type="text" class="search-admin" id="search-student" placeholder="Buscar estudiante por nombre o correo...">

  <div class="admin-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Estudiante</th>
          <th>Nivel</th>
          <th>Unidades</th>
          <th>Última Actividad</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="users-list">
        <tr><td colspan="5" style="text-align:center;padding:3rem">Cargando registros del oráculo...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script>
const SUPER_ADMIN = "laforcada@gmail.com";
let allUsers = [];

async function loadData(currentUser) {
  if (currentUser.email !== SUPER_ADMIN) {
    // Si no es el super admin, verificamos si es un admin promovido
    const snap = await firebase.database().ref('users/' + currentUser.uid).once('value');
    const userData = snap.val();
    if (!userData || !userData.isAdmin) {
      window.location.href = 'index.html';
      return;
    }
  }

  const usersRef = firebase.database().ref('users');
  const examsRef = firebase.database().ref('examResults');

  // Fetch data
  const userSnap = await usersRef.once('value');
  const examSnap = await examsRef.once('value');

  const users = userSnap.val() || {};
  const exams = examSnap.val() || {};

  allUsers = Object.values(users);
  const examList = Object.values(exams);

  renderUsers(allUsers, currentUser.email === SUPER_ADMIN);
  updateStats(allUsers, examList);
}

function renderUsers(list, isSuperAdmin) {
  const container = document.getElementById('users-list');
  container.innerHTML = '';

  if(list.length === 0) {
    container.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem">No hay estudiantes registrados aún.</td></tr>';
    return;
  }

  list.forEach(u => {
    const unitsCount = u.completedUnits ? u.completedUnits.length : 0;
    const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—';
    const isAdmin = u.isAdmin ? '<span class="badge badge-gold">Admin</span>' : '';
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>
        <div style="font-weight:600">${u.displayName || 'Anónimo'} ${isAdmin}</div>
        <div style="font-size:0.75rem;color:var(--text-dim)">${u.email}</div>
      </td>
      <td><span class="badge badge-gold">Nivel ${u.level || 1}</span></td>
      <td>${unitsCount} unidades</td>
      <td>${date}</td>
      <td>
        ${isSuperAdmin && !u.isAdmin && u.email !== SUPER_ADMIN ? 
          `<button onclick="makeAdmin('${u.uid}')" class="btn btn-ghost btn-sm" style="font-size:0.7rem;border:1px solid var(--gold-dim)">Hacer Admin</button>` : 
          `<span class="badge badge-blue">Estudiante</span>`
        }
      </td>
    `;
    container.appendChild(row);
  });
}

async function makeAdmin(uid) {
  if(!confirm('¿Estás seguro de que quieres darle poderes de administrador a este usuario?')) return;
  try {
    await firebase.database().ref('users/' + uid).update({ isAdmin: true });
    alert('Usuario promovido con éxito.');
    location.reload();
  } catch(e) {
    alert('Error al promover: ' + e.message);
  }
}

function updateStats(users, exams) {
  document.getElementById('total-users').textContent = users.length;
  document.getElementById('total-exams').textContent = exams.length;
  
  if(exams.length > 0) {
    const avg = exams.reduce((a, b) => a + (b.score || 0), 0) / exams.length;
    document.getElementById('avg-score').textContent = Math.round(avg) + '%';
  }
}

document.getElementById('search-student').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtered = allUsers.filter(u => 
    (u.displayName || '').toLowerCase().includes(q) || 
    (u.email || '').toLowerCase().includes(q)
  );
  renderUsers(filtered, firebase.auth().currentUser.email === SUPER_ADMIN);
});

document.addEventListener('DOMContentLoaded', async () => {
  const user = await window.MalekiAuth.requireAuth();
  if(user) loadData(user);
});
</script>
</body>
</html>
